services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: loopera-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-loopera}
      POSTGRES_USER: ${DB_USER:-loopera_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loopera-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-loopera_user} -d ${DB_NAME:-loopera}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: loopera-backend
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - loopera-network
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  loopera-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
